services:
  redis:
    image: redis:7-alpine
    container_name: reunionwiki_staging_redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - reunionwiki_net

  web:
    build: .
    container_name: reunionwiki_staging_web
    restart: unless-stopped
    environment:
      FLASK_ENV: staging
      FLASK_DEBUG: "0"
      RATELIMIT_STORAGE_URL: redis://redis:6379/0
      DATABASE_PATH: /app/data/staging.db
    depends_on:
      - redis
    volumes:
      - .:/app
      - ./data:/app/data
    expose:
      - "8000"
    networks:
      - reunionwiki_net

networks:
  reunionwiki_net:
    external: true
