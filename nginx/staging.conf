# =========================
# DEV - HTTP -> HTTPS
# =========================
server {
    listen 80;
    server_name dev.reunionwiki.re;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# DEV - HTTPS
# =========================
server {
    listen 443 ssl http2;
    server_name dev.reunionwiki.re;

    ssl_certificate /etc/letsencrypt/live/reunionwiki.re-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reunionwiki.re-0001/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://reunionwiki_staging_web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
