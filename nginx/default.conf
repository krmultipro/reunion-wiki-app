server {
    listen 80;
    server_name reunionwiki.re www.reunionwiki.re;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name reunionwiki.re www.reunionwiki.re;

    ssl_certificate /etc/letsencrypt/live/reunionwiki.re/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reunionwiki.re/privkey.pem;

    # ======================
    # ANTI SCANNERS
    # ======================
    location ~* /(wp-|phpunit|cgi-bin|\.env|\.git|\.svn|admin\.php|shell\.php|info\.php) {
        return 444;
    }

    # ======================
    # STATIC (CACHE 1 AN)
    # ======================
    location /static/ {
        alias /var/www/static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ======================
    # PROXY FLASK
    # ======================
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}



