version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env # Charge automatiquement vos variables SECRET_KEY, DATABASE_PATH, etc.
    environment:
      - FLASK_ENV=development
      - RATELIMIT_STORAGE_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - .:/app
