services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: ${FLASK_ENV}
      FLASK_DEBUG: ${FLASK_DEBUG}
      RATELIMIT_STORAGE_URL: ${RATELIMIT_STORAGE_URL}
      DATABASE_PATH: ${DATABASE_PATH}
    depends_on:
      - redis
    volumes:
      - .:/app 
      - ./data:/app/data
