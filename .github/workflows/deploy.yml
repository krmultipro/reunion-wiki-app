name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 51.68.71.69
          username: debian
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/reunion-wiki-app
            git pull origin main
            docker-compose -p reunionwiki_prod -f docker-compose.prod.yml down
            docker-compose -p reunionwiki_prod -f docker-compose.prod.yml up -d --build
