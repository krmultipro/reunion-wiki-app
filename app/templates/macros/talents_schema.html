{% macro talents_schema(talents) %} {% if talents %} {% set all_talents = [] %}
{% for _, people in talents.items() %} {% for talent in people %} {% set _ =
all_talents.append(talent) %} {% endfor %} {% endfor %}

<script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "Talents de La Réunion – Influenceurs, Comédiens & Chanteurs",
    "description": "Découvrez les influenceurs, comédiens et chanteurs réunionnais à suivre sur Instagram",
    "itemListElement": [
      {% for talent in all_talents %}
      {
        "@type": "ListItem",
        "position": {{ loop.index }},
        "item": {
          "@type": "Person",
          "name": {{ talent.name|tojson }},
          "url": {{ talent.instagram|tojson }},
          "jobTitle": {{ talent.tagline|tojson }},
          "sameAs": {{ talent.instagram|tojson }}
        }
      }{% if not loop.last %},{% endif %}
      {% endfor %}
    ]
  }
</script>
{% endif %} {% endmacro %}
