services:
  redis:
    image: redis:7-alpine
    container_name: reunionwiki_staging_redis
    restart: unless-stopped
    expose:
      - "6379"

  web:
    build: .
    container_name: reunionwiki_staging_web
    restart: unless-stopped
    environment:
      FLASK_ENV: staging
      FLASK_DEBUG: "0"
      RATELIMIT_STORAGE_URL: redis://redis:6379/0
      DATABASE_PATH: /app/data/staging.db
    depends_on:
      - redis
    volumes:
      - .:/app
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: reunionwiki_staging_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - web
